services:
  - type: web
    name: gigflow-backend
    env: node
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        value: https://your-frontend-url.vercel.app # Update this after frontend deployment
      - key: MONGO_URI
        sync: false # You need to provide this in the Render dashboard from MongoDB Atlas
      - key: JWT_SECRET
        generateValue: true
