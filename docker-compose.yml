version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: gigflow_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - gigflow_network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gigflow_backend
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/gigflow
      - JWT_SECRET=gigflow_production_jwt_secret_key_change_me
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost:80
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - gigflow_network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api/v1
    container_name: gigflow_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - gigflow_network

networks:
  gigflow_network:
    driver: bridge

volumes:
  mongodb_data:
